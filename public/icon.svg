<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!--
    Brickme logo — 4-hart klaver
    Elke hart heeft zijn punt gericht naar het centrum (50,50).
    Hart-pad: punt naar beneden, breedte 56, breedte bogen r=14
  -->
  <g fill="#C8583A">
    <!-- Linksboven: punt → rechtsonder (rotate -45) -->
    <path transform="translate(33,33) rotate(-45)"
          d="M -28,-24 A 14,14,0,0,0,0,-24 A 14,14,0,0,0,28,-24 Q 28,0 0,24 Q -28,0 -28,-24 Z"/>
    <!-- Rechtsboven: punt → linksonder (rotate 45) -->
    <path transform="translate(67,33) rotate(45)"
          d="M -28,-24 A 14,14,0,0,0,0,-24 A 14,14,0,0,0,28,-24 Q 28,0 0,24 Q -28,0 -28,-24 Z"/>
    <!-- Linksonder: punt → rechtsboven (rotate 225) -->
    <path transform="translate(33,67) rotate(225)"
          d="M -28,-24 A 14,14,0,0,0,0,-24 A 14,14,0,0,0,28,-24 Q 28,0 0,24 Q -28,0 -28,-24 Z"/>
    <!-- Rechtsonder: punt → linksboven (rotate 135) -->
    <path transform="translate(67,67) rotate(135)"
          d="M -28,-24 A 14,14,0,0,0,0,-24 A 14,14,0,0,0,28,-24 Q 28,0 0,24 Q -28,0 -28,-24 Z"/>
  </g>
</svg>
